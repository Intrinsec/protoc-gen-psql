name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  schedule:
    # Weekly govulncheck against master so newly-published CVEs surface
    # even when there are no commits. Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  GOFLAGS: "-mod=vendor"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests with coverage
        run: |
          go test -mod=vendor ./... -count=1 -coverprofile=cov.out
          go tool cover -func=cov.out | tail -1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: cov.out
          retention-days: 7

  test-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install protoc + well-known type protos
        run: |
          sudo apt-get update
          # libprotobuf-dev ships /usr/include/google/protobuf/*.proto
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
      - name: make test-generate
        run: make test-generate

  test-buf-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install buf
        env:
          GOFLAGS: ""
        run: go install github.com/bufbuild/buf/cmd/buf@v1.50.0
      - name: make test-buf-generate
        run: make test-buf-generate

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install protoc + well-known type protos
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
      - name: make test-integration
        run: make test-integration

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        env:
          GOFLAGS: ""
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -mod=vendor -o bin/protoc-gen-psql .
      - uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-psql
          path: bin/protoc-gen-psql
          retention-days: 7

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install cyclonedx-gomod
        env:
          GOFLAGS: ""
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - name: Generate CycloneDX SBOM
        run: cyclonedx-gomod mod -licenses -json -output sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install go-licenses
        env:
          GOFLAGS: ""
        run: go install github.com/google/go-licenses@latest
      - name: Export license inventory
        run: go-licenses csv ./... > licenses.csv
      - name: Enforce allow-list
        run: |
          go-licenses check ./... \
            --allowed_licenses="Apache-2.0,BSD-2-Clause,BSD-3-Clause,MIT,ISC,MPL-2.0"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: licenses
          path: licenses.csv
          retention-days: 30

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [lint, unit-test, test-generate, test-buf-generate, test-integration, govulncheck, build, sbom, license-check]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"
